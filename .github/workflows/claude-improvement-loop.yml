name: Claude - Autonomous Improvement Loop

on:
  schedule:
    - cron: '0 0 * * 1'  # Monday 9:00 AM JST (UTC 0:00)
    # Uncomment to also run on Fridays (~$5 per run)
    # - cron: '0 0 * * 5'  # Friday 9:00 AM JST (UTC 0:00)
  workflow_dispatch:      # Manual trigger for testing

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write        # ← DO NOT REMOVE — required for claude-code-action@v1 OIDC auth

jobs:
  improvement-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -q "google-auth>=2.0,<3" "google-api-python-client>=2.0,<3" "requests>=2.0,<3"

      - name: Setup git user
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 100 --dangerously-skip-permissions"
          # show_full_output: "true"  # Uncomment for debugging
          prompt: |
            You are the autonomous improvement agent for this repository.
            Follow the steps in .claude/skills/improvement-loop.md to run one full improvement cycle.

            Trigger: ${{ github.event_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          ADSENSE_CLIENT_ID: ${{ secrets.ADSENSE_CLIENT_ID }}
          ADSENSE_CLIENT_SECRET: ${{ secrets.ADSENSE_CLIENT_SECRET }}
          ADSENSE_REFRESH_TOKEN: ${{ secrets.ADSENSE_REFRESH_TOKEN }}
          ADSENSE_PUBLISHER_ID: ${{ secrets.ADSENSE_PUBLISHER_ID }}

      # Assign Copilot to any auto-improvement PRs that have no reviewer yet.
      # Bot-created PRs don't fire pull_request events, so auto-assign workflows won't trigger.
      - name: Assign Copilot to auto-improvement PRs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --label auto-improvement --state open \
            --json number,reviewRequests \
            --jq '.[] | select(.reviewRequests | length == 0) | .number' | \
          while read pr_number; do
            gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/pulls/${pr_number}/requested_reviewers" \
              -f "reviewers[]=copilot-pull-request-reviewer" \
              && echo "Copilot assigned to PR #${pr_number}" \
              || echo "Copilot assignment skipped for PR #${pr_number}"
          done
